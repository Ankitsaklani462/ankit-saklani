<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       const date_obj = new Date();
       const time_str = date_obj.getHours() + ":" + date_obj.getMinutes() + ":" + date_obj.getSeconds();
       document.write(time_str)
    </script>
</body>
</html>
