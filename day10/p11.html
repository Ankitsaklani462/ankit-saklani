<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        for (let i = 1; i <= 9; i++)
         {for(let j=9; j>=i; j--){
           document.write("&nbsp&nbsp")}
           if(i%2!=0)
         for(let k=1; k<=i; k++){
            document.write("*&nbsp&nbsp")
         }
                document.write("<br>")}
            
    </script>

</body>
