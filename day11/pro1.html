<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function cube(num){
            return num*num*num;
        }
        let num=parseInt(prompt("enter your digit:"))
        document.write(cube(num))
    </script>
</body>
</html>
