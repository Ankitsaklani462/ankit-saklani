<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let num = parseInt(prompt("Enter your num:"))
        let status = true
        for (i = 2; i < num; i++) {
            if (num % i == 0) { status = false }

        } if (status) {
            document.write("number is prime:" + num)

        }
        else {
            document.write("number is not prime:" + num)

        }
    </script>

</body>

</html>
