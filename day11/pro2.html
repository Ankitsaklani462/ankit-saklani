<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function power1() {
            let result = 1
            for (let i = 1; i <= power; i++) {
                result = result * num
            }
            return result;
        }



        let num = parseInt(prompt("Enter your num:"))
        let power = parseInt(prompt("Enter your power:"))
        document.write(power1())

    </script>

</body>

</html>
