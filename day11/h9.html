<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        for (let num = 2; num <= 100; num++) {
            let status = true;
            for (let i = 2; i < num; i++) {
                if (num % i == 0) { status = false }
            }
            if (status) {
                document.write(num);
                document.write("<br>")
            }
        }


    </script>


</body>

</html>
