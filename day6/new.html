<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Contact Form</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(rgba(0, 0, 0, 0.5),
                    rgba(0, 0, 0, 0.5)),
                url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1150px;
            display: flex;
            overflow: hidden;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            animation: fade 0.8s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LEFT SIDE */
        .left {
            width: 40%;
            padding: 50px 40px;
            background: linear-gradient(135deg, #ff6b6b, #ff9966);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left h1 {
            font-size: 42px;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .left p {
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #f3f3f3;
        }

        .info {
            margin-top: 20px;
        }

        .info div {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            gap: 15px;
            font-size: 15px;
        }

        .info i {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* RIGHT SIDE */
        .right {
            width: 60%;
            padding: 50px;
            background: rgba(255, 255, 255, 0.08);
        }

        .right h2 {
            color: white;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .right p {
            color: #ddd;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-box {
            width: 100%;
            position: relative;
        }

        .input-box i {
            position: absolute;
            top: 18px;
            left: 15px;
            color: #ddd;
            font-size: 14px;
        }

        input,
        textarea {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: none;
            outline: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.14);
            color: white;
            font-size: 15px;
            transition: 0.3s ease;
        }

        textarea {
            height: 130px;
            resize: none;
        }

        input::placeholder,
        textarea::placeholder {
            color: #ddd;
        }

        input:focus,
        textarea:focus {
            background: rgba(255, 255, 255, 0.22);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff6b6b, #ff9966);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }

        .socials {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .socials a {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: 0.4s;
        }

        .socials a:hover {
            background: white;
            color: #ff6b6b;
            transform: rotate(360deg) scale(1.1);
        }

        /* RESPONSIVE */
        @media(max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .left,
            .right {
                width: 100%;
            }
        }

        @media(max-width: 600px) {
            .row {
                flex-direction: column;
            }

            .left h1 {
                font-size: 32px;
            }

            .right {
                padding: 35px 25px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left">

            <h1>Let's Talk</h1>

            <p>
                Have any questions, ideas, or projects?
                Feel free to contact us anytime.
                We’ll get back to you as soon as possible 🚀
            </p>

            <div class="info">

                <div>
                    <i class="fa-solid fa-location-dot"></i>
                    Rajasthan, India
                </div>

                <div>
                    <i class="fa-solid fa-envelope"></i>
                    contact@gmail.com
                </div>

                <div>
                    <i class="fa-solid fa-phone"></i>
                    +91 9876543210
                </div>

            </div>

            <div class="socials">

                <a href="#"><i class="fab fa-facebook-f"></i></a>

                <a href="#"><i class="fab fa-instagram"></i></a>

                <a href="#"><i class="fab fa-x-twitter"></i></a>

                <a href="#"><i class="fab fa-linkedin-in"></i></a>

            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="right">

            <h2>Contact Us</h2>

            <p>Fill the form below and send your message ✨</p>

            <form>

                <div class="row">

                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="First Name" required>
                    </div>

                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Last Name" required>
                    </div>

                </div>

                <div class="row">

                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Email Address" required>
                    </div>

                    <div class="input-box">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" placeholder="Phone Number" required>
                    </div>

                </div>

                <div class="row">

                    <div class="input-box">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text" placeholder="Your Address">
                    </div>

                </div>

                <div class="row">

                    <div class="input-box">
                        <i class="fa-solid fa-message"></i>
                        <textarea placeholder="Write your message here..."></textarea>
                    </div>

                </div>

                <button class="btn" type="submit">
                    Send Message
                </button>

            </form>

        </div>

    </div>

</body>

</html>
