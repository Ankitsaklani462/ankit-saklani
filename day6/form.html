<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .container {
            /* background-color: aqua; */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            
        }
form{ background-color: rgb(138, 201, 244);
border: 2px solid black;
width: 450px;
border-radius: 5px;
}

div{display: flex;
            align-items: center;
            justify-content: center;
        }
        
input{background-color: rgb(248, 250, 250);
margin: 5px;
height: 40px;
width: 220px;
border-radius: 5px;
}
input:hover{scale: 105%;}

textarea{background-color: rgb(247, 247, 248);
margin: 5px;
height: 80px;
width: 100%;
border-radius: 5px;}
textarea:hover{scale: 105%;}
    </style>

</head>

<body>
    
    <div class="container">
        <form action="">
            <h1 align="center">Get in Touch</h1>

            <div><input type="text" name="" id="" placeholder="First Name">
                <input type="text" name="" id="" placeholder="Last Name">
            </div>

            <div><input type="email" name="" id="" placeholder="Email">
                <input type="text" name="" id="" placeholder="Phone no.">
            </div>

            <div><input style="width: 100%;" placeholder="Address"></div>
            <div><textarea name="" id="" cols="44" rows="3"></textarea></div>
           
            <div><input style="width: 30%;" type="submit" value="Submit"></div>

        </form>
    </div>

</body>

</html>
