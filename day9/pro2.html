<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let num1 = parseInt(prompt("enter first num:"));
        let num2 = parseInt(prompt("enter second num:"));
        let num3 = parseInt(prompt("enter third num:"));
        let num4 = parseInt(prompt("enter fourth num:"));
        if (num1 > num2) {

            if (num1 > num3) {

                if (num1 > num4) {
                    document.write("First number is greater: " + num1);
                }
                else {
                    document.write("Fourth number is greater: " + num4);
                }

            }
            else {

                if (num3 > num4) {
                    document.write("Third number is greater: " + num3);
                }
                else {
                    document.write("Fourth number is greater: " + num4);
                }

            }

        }
        else {

            if (num2 > num3) {

                if (num2 > num4) {
                    document.write("Second number is greater: " + num2);
                }
                else {
                    document.write("Fourth number is greater: " + num4);
                }

            }
            else {

                if (num3 > num4) {
                    document.write("Third number is greater: " + num3);
                }
                else {
                    document.write("Fourth number is greater: " + num4);
                }

            }

        }
    </script>

</body>

</html>
