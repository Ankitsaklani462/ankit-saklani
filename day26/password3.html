<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>

    <style>
        body {
            background-color: rgb(157, 243, 157);
            font-family: Arial, sans-serif;
        }

        h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 100px;
            font-size: 70px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
            margin-top: 50px;
        }

        .box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .in {
            color: rgb(24, 62, 230);
            font-size: 40px;
            text-align: center;
        }

        input {
            height: 80px;
            width: 500px;
            color: blue;
            font-size: 40px;
            text-align: center;
        }

        button {
            height: 80px;
            width: 500px;
            font-size: 25px;
            cursor: pointer;
            color: rgb(70, 5, 161);
            font-weight: bold;
        }

        #history {
            width: 300px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        #history h2 {
            text-align: center;
            color: rgb(70, 5, 161);
        }

        #passwordList {
            list-style-type: decimal;
            font-size: 22px;
            color: darkblue;
            padding-left: 25px;
        }

        #passwordList li {
            margin: 10px 0;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <h1>Password Generator</h1>

    <div class="container">

        <div class="box">
            <div class="in">
                Password:
                <input type="text" id="passwordid" readonly>
            </div>

            <button id="generatepassword">
                Suggest Password
            </button>
        </div>

        <div id="history">
            <h2>Password History</h2>
            <ul id="passwordList"></ul>
        </div>

    </div>

    <script>
        document.getElementById('generatepassword').addEventListener('click', () => {

            let ran1 = String.fromCodePoint(parseInt(Math.random() * 26 + 65));
            let ran2 = String.fromCodePoint(parseInt(Math.random() * 26 + 65));

            let ran3 = String.fromCodePoint(parseInt(Math.random() * 15 + 33));
            let ran4 = String.fromCodePoint(parseInt(Math.random() * 15 + 33));

            let ran5 = String.fromCodePoint(parseInt(Math.random() * 10 + 48));
            let ran6 = String.fromCodePoint(parseInt(Math.random() * 10 + 48));

            let ran7 = String.fromCodePoint(parseInt(Math.random() * 26 + 97));
            let ran8 = String.fromCodePoint(parseInt(Math.random() * 26 + 97));

            let result = ran1 + ran2 + ran3 + ran4 + ran5 + ran6 + ran7 + ran8;

            document.getElementById('passwordid').value = result;

            // History list me add karo
            let li = document.createElement('li');
            li.textContent = result;

            document.getElementById('passwordList').prepend(li);
        });
    </script>

</body>

</html>
