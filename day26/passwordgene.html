<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1f1c2c, #928dab);
        font-family: Arial, sans-serif;
    }

    .card {
        background: #fff;
        padding: 25px;
        border-radius: 15px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        text-align: center;
    }

    h2 {
        margin-bottom: 15px;
    }

    input[type="text"] {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #ccc;
        text-align: center;
    }

    .controls {
        margin: 15px 0;
    }

    input[type="range"] {
        width: 100%;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        margin-top: 10px;
        cursor: pointer;
        font-size: 15px;
    }

    .gen {
        background: #6c63ff;
        color: white;
    }

    .copy {
        background: #00b894;
        color: white;
    }

    .strength {
        margin-top: 10px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="card">
    <h2>🔐 Password Generator</h2>

    <input type="text" id="password" readonly>

    <div class="controls">
        <label>Length: <span id="lenVal">12</span></label>
        <input type="range" id="length" min="6" max="24" value="12">
    </div>

    <button class="gen" onclick="generate()">Generate Password</button>
    <button class="copy" onclick="copyPassword()">Copy</button>

    <div class="strength" id="strength">Strength: -</div>
</div>

<script>
const passwordField = document.getElementById("password");
const lengthSlider = document.getElementById("length");
const lenVal = document.getElementById("lenVal");
const strengthText = document.getElementById("strength");

const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+[]{}|;:,.<>?";

lengthSlider.addEventListener("input", () => {
    lenVal.textContent = lengthSlider.value;
});

function generate() {
    let length = lengthSlider.value;
    let password = "";

    for (let i = 0; i < length; i++) {
        let rand = Math.floor(Math.random() * chars.length);
        password += chars[rand];
    }

    passwordField.value = password;
    checkStrength(password);
}

function checkStrength(pass) {
    let strength = 0;

    if (pass.length >= 10) strength++;
    if (/[A-Z]/.test(pass)) strength++;
    if (/[0-9]/.test(pass)) strength++;
    if (/[^A-Za-z0-9]/.test(pass)) strength++;

    if (strength <= 1) {
        strengthText.innerText = "Strength: Weak 🔴";
        strengthText.style.color = "red";
    } else if (strength === 2 || strength === 3) {
        strengthText.innerText = "Strength: Medium 🟡";
        strengthText.style.color = "orange";
    } else {
        strengthText.innerText = "Strength: Strong 🟢";
        strengthText.style.color = "green";
    }
}

function copyPassword() {
    passwordField.select();
    document.execCommand("copy");
    alert("Password copied!");
}
</script>

</body>
</html>
