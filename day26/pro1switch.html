<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num=parseInt(prompt("Enter your num: "))
        switch(num){
            case 1:
            case 2:
                console.log("two")
                break
            case 3:
                console.log("three")
                break
            default:
                console.log("default")

        }
    </script>
</body>
