<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(157, 243, 157);
           
        }
        .box {
            display: flex;
            align-items: center;
            justify-content: center;
            
            
        }

        input {
            height: 100px;
            width: 500px;
            ;
            color: blue;
            font-size: 50px;
            text-align: center;

        }

        button {
            height: 100px;
            width: 500px;
            font-size: 30px;
        }

        .in {
            color: rgb(24, 62, 230);
            font-size: 50px;
            text-align: center;

        }
        h1{  display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 250px;
            font-size: 100px;

        }
    </style>
</head>

<body>
    <h1>Password Generator</h1>
    <div class="box">
        <div class="in">Password:<input type="" name="" id="passwordid"></div>
        <div><button id="generatepassword" style="color: rgb(70, 5, 161);font-weight: 300;">Suggest Password</button>
        </div>
    </div>


    <script>

        document.getElementById('generatepassword').addEventListener('click', () => {
            let ran1 = String.fromCodePoint(parseInt(Math.random() * 25.55 + 65))
            let ran2 = String.fromCodePoint(parseInt(Math.random() * 25.55 + 65))
            let ran3 = String.fromCodePoint(parseInt(Math.random() * 14.55 + 33))
            let ran4 = String.fromCodePoint(parseInt(Math.random() * 14.55 + 33))
            let ran5 = String.fromCodePoint(parseInt(Math.random() * 9.55 + 48))
            let ran6 = String.fromCodePoint(parseInt(Math.random() * 9.55 + 48))
            let ran7 = String.fromCodePoint(parseInt(Math.random() * 25.55 + 97))
            let ran8 = String.fromCodePoint(parseInt(Math.random() * 25.55 + 97))

            let result = ran1 + ran2 + ran3 + ran4 + ran5 + ran6 + ran7 + ran8
            document.getElementById('passwordid').value = result
        })
    </script>
</body>

</html>
