<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: linear-gradient(145deg, rgb(18, 27, 190), rgb(42, 97, 160), rgb(102, 140, 223));
    font-family: Arial, sans-serif;
}

.box {
    height: auto;
    width: 320px;
    padding: 20px;
    border-radius: 15px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    color: white;
}

h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 20px;
    letter-spacing: 1px;
}

.box div {
    margin: 12px 0;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: none;
    border-radius: 8px;
    outline: none;
    font-size: 15px;
}

button {
    width: 48%;
    margin: 5px 1%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(145deg, #1e3c72, #2a5298);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(145deg, #2a5298, #1e3c72);
}

#res {
    background: #fff;
    color: black;
    font-weight: bold;
}</style>
</head>

<body>
    <div class="box"><h1 style="text-align: center;font-size: 30px;">Calculator</h1>
        <div>Number1: <input type="text" name="" id="num1"></div>
        <div>Number2: <input type="text" name="" id="num2"></div>
        <button id="b1">Add+</button>
        <button id="b2">sub-</button>
        <button id="b3">Mul*</button>
        <button id="b4">Div/</button>
        <button id="b5">Per%</button>
        <div>Result: <input type="text" name="" id="res" readonly></div>
    </div>
    <script>


        document.getElementById('b1').addEventListener('click', () => {
            let num1 = parseInt(document.getElementById('num1').value)
            let num2 = parseInt(document.getElementById('num2').value)
            let result1 = num1 + num2; document.getElementById('res').value = result1
        })
        document.getElementById('b2').addEventListener('click', () => {
            let num1 = parseInt(document.getElementById('num1').value)
            let num2 = parseInt(document.getElementById('num2').value)
            let result2 = num1 - num2; document.getElementById('res').value = result2
        })
        document.getElementById('b3').addEventListener('click', () => {
            let num1 = parseInt(document.getElementById('num1').value)
            let num2 = parseInt(document.getElementById('num2').value)
            let result3 = num1 * num2; document.getElementById('res').value = result3
        })
        document.getElementById('b4').addEventListener('click', () => {
            let num1 = parseInt(document.getElementById('num1').value)
            let num2 = parseInt(document.getElementById('num2').value)
            let result4 = num1 / num2; document.getElementById('res').value = result4
        })
        document.getElementById('b5').addEventListener('click', () => {
            let num1 = parseInt(document.getElementById('num1').value)
            let num2 = parseInt(document.getElementById('num2').value)
            let result5 = (num1 /100)*num2
                ; document.getElementById('res').value = result5
        })

    </script>


</body>

</html>
